---
name: 'PR Tests (Windows)'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Claude suggested linter task.
  lint-powershell:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install PSScriptAnalyzer
        shell: powershell
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
      - name: Lint PowerShell scripts
        shell: powershell
        run: |
          $results = Invoke-ScriptAnalyzer -Path tasks/ -Recurse
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }

  test-install-task-on-windows:
    runs-on: windows-latest
    needs: lint-powershell
    steps:
      - uses: actions/checkout@v6
        with:
          path: openvox_bootstrap
      - name: Run install task manually for openvox-agent
        shell: powershell
        run: ./openvox_bootstrap/tasks/install_windows.ps1 -collection openvox8
      - name: Verify openvox-agent is installed
        shell: powershell
        run: ./openvox_bootstrap/tasks/check_windows.ps1 -version "8" -test 'gt'
      - name: Verify idempotency
        shell: powershell
        run: ./openvox_bootstrap/tasks/install_windows.ps1 -collection openvox8
      - name: Verify that check task can provide a negative result
        shell: powershell
        run: |-
          $ErrorActionPreference = 'continue'
          ./openvox_bootstrap/tasks/check_windows.ps1 -version "8" -test 'lt'
          if ($LASTEXITCODE -eq 0) {
            throw "Check task should have failed version test but did not."
          } else {
            echo "Check task failed version test and exited non-zero as expected."
            exit 0
          }

  test-install-version-on-windows:
    runs-on: windows-latest
    needs: lint-powershell
    steps:
      - uses: actions/checkout@v6
        with:
          path: openvox_bootstrap
      - name: Run install task manually for openvox-agent
        shell: powershell
        run: ./openvox_bootstrap/tasks/install_windows.ps1 -version "8.22.1"
      - name: Verify openvox-agent is installed
        shell: powershell
        run: ./openvox_bootstrap/tasks/check_windows.ps1 -version "8.22.1"
      - name: Verify idempotency
        shell: powershell
        run: ./openvox_bootstrap/tasks/install_windows.ps1 -version "8.22.1"

  test-downgrade-on-windows:
    runs-on: windows-latest
    needs: lint-powershell
    steps:
      - uses: actions/checkout@v6
        with:
          path: openvox_bootstrap
      - name: Install latest agent
        shell: powershell
        run: ./openvox_bootstrap/tasks/install_windows.ps1 -collection openvox8
      - name: Verify later openvox-agent is installed
        shell: powershell
        run: ./openvox_bootstrap/tasks/check_windows.ps1
      - name: Install older version of agent
        shell: powershell
        run: ./openvox_bootstrap/tasks/install_windows.ps1 -version "8.22.1" -stop_service $true
      - name: Verify openvox-agent is downgraded
        shell: powershell
        run: ./openvox_bootstrap/tasks/check_windows.ps1 -version "8.22.1"
